services:
  strapi:
    container_name: ${SITE_NAME}_strapi
    build: .
    image: ${SITE_NAME}_strapi:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_CLIENT: ${DATABASE_CLIENT}
      DATABASE_HOST: strapiDB
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PORT: ${DATABASE_PORT}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      NODE_ENV: ${NODE_ENV}
    volumes:
      - ./config:/opt/app/config
      - ./src:/opt/app/src
      - ./package.json:/opt/package.json
      - ./yarn.lock:/opt/yarn.lock
      - ./.env:/opt/app/.env
      - ./public/uploads:/opt/app/public/uploads
    ports:
      - '${STRAPI_PORT:-1337}:1337'
    networks:
      - strapi
    depends_on:
      - strapiDB

  strapiDB:
    container_name: ${SITE_NAME}_db
    platform: linux/amd64
    restart: unless-stopped
    env_file: .env
    image: postgres:14.5-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - strapi-data:/var/lib/postgresql/data/
    networks:
      - strapi

  strapiAdminer:
    container_name: ${SITE_NAME}_adminer
    image: adminer
    restart: unless-stopped
    ports:
      - '${ADMINER_PORT:-9090}:8080'
    environment:
      - ADMINER_DEFAULT_SERVER=strapiDB
    networks:
      - strapi
    depends_on:
      - strapiDB

  # ── Optional frontend (activated by: docker compose --profile full up) ────────
  frontend:
    profiles: [full]
    container_name: ${SITE_NAME}_frontend
    build:
      context: ../Frontend
      args:
        - PUBLIC_STRAPI_URL
    image: ${SITE_NAME}_frontend:latest
    restart: unless-stopped
    env_file: ../Frontend/.env
    environment:
      HOST: 0.0.0.0
      PORT: 4321
    ports:
      - '${FRONTEND_PORT:-4321}:4321'
    networks:
      - strapi

volumes:
  strapi-data:
    name: ${SITE_NAME}_db_data

networks:
  strapi:
    name: ${SITE_NAME}_network
    driver: bridge
